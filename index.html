*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px;}

.landing-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.landing-logo{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:3.2rem;margin-bottom:1.5rem;box-shadow:0 0 60px var(--primary-dim),0 0 120px var(--secondary-dim);animation:float 3s ease-in-out infinite;}

.landing-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
.landing-features{margin-top:3rem;display:flex;gap:2.5rem;flex-wrap:wrap;justify-content:center;}
.landing-feature{text-align:center;padding:1.5rem;background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--radius);backdrop-filter:blur(10px);min-width:140px;transition:all 0.3s;}
.landing-feature:hover{border-color:var(--primary);transform:translateY(-3px);}
.landing-feature-num{font-size:2rem;font-weight:900;font-family:'Orbitron',sans-serif;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 30px var(--primary-dim);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{opacity:0.85;}
.btn-sm{padding:8px 16px;font-size:0.85rem;}.btn-xs{padding:5px 12px;font-size:0.78rem;border-radius:6px;}

.batch-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}

.batch-card:hover{border-color:var(--primary);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,232,162,0.15);}
.batch-year{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--primary);margin-bottom:0.3rem;}
.batch-label{color:var(--text-dim);font-size:0.9rem;margin-bottom:1rem;}

.qna-title{font-weight:600;font-size:1rem;margin-bottom:0.3rem;}
.qna-body{color:var(--text-dim);font-size:0.9rem;line-height:1.5;}
.qna-actions{display:flex;gap:0.5rem;margin-top:0.8rem;flex-wrap:wrap;}
.qna-category-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;background:var(--primary-dim);color:var(--primary);margin-bottom:0.5rem;}
.answer-item{background:var(--surface2);border-radius:var(--radius-sm);padding:1rem;margin-top:0.5rem;margin-left:2rem;border-left:2px solid var(--primary);}

.chat-layout{display:flex;height:calc(100vh - 100px);}
.chat-list-panel{width:300px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface);border-radius:var(--radius) 0 0 var(--radius);}
.chat-list-header{padding:1rem;border-bottom:1px solid var(--border);}
.chat-list{flex:1;overflow-y:auto;}
.chat-list-item{display:flex;align-items:center;gap:10px;padding:0.8rem 1rem;cursor:pointer;transition:background 0.2s;border-bottom:1px solid var(--border);}
.chat-list-item:hover{background:var(--surface2);}.chat-list-item.active{background:var(--primary-dim);}
.chat-room-panel{flex:1;display:flex;flex-direction:column;background:var(--bg);border-radius:0 var(--radius) var(--radius) 0;}
.chat-room-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.5rem;}
.chat-msg{max-width:70%;padding:10px 14px;border-radius:12px;font-size:0.9rem;line-height:1.4;word-break:break-word;}
.chat-msg.sent{align-self:flex-end;background:linear-gradient(135deg,var(--primary),#00b882);color:#000;border-bottom-right-radius:4px;}
.chat-msg.received{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:4px;}
.chat-msg-time{font-size:0.68rem;opacity:0.6;margin-top:4px;}
.chat-input-area{padding:1rem;border-top:1px solid var(--border);display:flex;gap:0.5rem;background:var(--surface);}
.chat-input-area input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'Inter',sans-serif;}
.chat-input-area input:focus{outline:none;border-color:var(--primary);}
.chat-request-item{display:flex;align-items:center;gap:10px;padding:0.8rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:0.5rem;}

.admin-tabs{display:flex;gap:0.3rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.admin-tab{padding:8px 18px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:0.85rem;transition:all 0.3s;font-weight:500;}
.admin-tab.active{background:var(--primary-dim);color:var(--primary);border-color:var(--primary);}
.admin-tab:hover{border-color:var(--primary);}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;}
.modal h3{font-family:'Orbitron',sans-serif;margin-bottom:1rem;color:var(--primary);}

.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:0.5rem;}
.toast{padding:12px 20px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);font-size:0.9rem;animation:slideIn 0.3s ease;display:flex;align-items:center;gap:8px;min-width:250px;max-width:400px;}
.toast.success{border-left:3px solid var(--primary);}.toast.error{border-left:3px solid var(--danger);}.toast.info{border-left:3px solid var(--secondary);}

.role-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:700;}
.role-badge.student{background:#3b82f620;color:#3b82f6;}.role-badge.teacher{background:#00e8a220;color:#00e8a2;}.role-badge.admin{background:#ef444420;color:#ef4444;}

.data-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.data-table th{text-align:left;padding:10px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-weight:600;color:var(--text-dim);text-transform:uppercase;font-size:0.75rem;letter-spacing:0.5px;}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);}.data-table tr:hover td{background:var(--surface2);}

.file-item{display:flex;align-items:center;gap:10px;padding:0.8rem;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:0.5rem;}
.file-item i{font-size:1.5rem;color:var(--primary);flex-shrink:0;}
.file-item-info{flex:1;min-width:0;}.file-item-name{font-size:0.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.file-item-meta{font-size:0.75rem;color:var(--text-dim);}

.empty-state{text-align:center;padding:3rem;color:var(--text-dim);}.empty-state i{font-size:3rem;margin-bottom:1rem;opacity:0.3;display:block;}.empty-state p{font-size:0.95rem;}

.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;}

.search-box input:focus{outline:none;}.search-box i{color:var(--text-dim);flex-shrink:0;}

.user-card{display:flex;align-items:center;gap:12px;padding:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:border-color 0.3s;}

.user-card-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;font-size:1rem;flex-shrink:0;}
.user-card-info{flex:1;min-width:0;}.user-card-name{font-weight:600;font-size:0.95rem;}.user-card-role{font-size:0.78rem;color:var(--text-dim);}

.mobile-header{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--surface);border-bottom:1px solid var(--border);z-index:99;padding:0 1rem;align-items:center;gap:10px;}
.mobile-menu-btn{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99;}
@media(max-width:768px){
  .mobile-header{display:flex;}.sidebar{transform:translateX(-100%);z-index:200;}.sidebar.open{transform:translateX(0);}.sidebar-overlay.show{display:block;}
  .main-content{margin-left:0;padding-top:70px;padding-left:1rem;padding-right:1rem;}
  .chat-layout{flex-direction:column;height:auto;}.chat-list-panel{width:100%;border-radius:var(--radius);}.chat-room-panel{border-radius:var(--radius);min-height:400px;}
  .cards-grid{grid-template-columns:1fr;}.data-table{font-size:0.75rem;}.data-table th,.data-table td{padding:6px 8px;}
}

.cat-tabs{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:1rem;}
.cat-tab{padding:6px 14px;border-radius:20px;font-size:0.8rem;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:all 0.3s;font-weight:500;}
.cat-tab.active{background:var(--primary-dim);color:var(--primary);border-color:var(--primary);}.cat-tab:hover{border-color:var(--primary);}

.promote-banner{background:linear-gradient(135deg, var(--secondary-dim), var(--primary-dim));border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:10px;}
.promote-banner i{font-size:1.2rem;color:var(--accent);}.promote-banner .text{flex:1;font-size:0.9rem;line-height:1.5;}.promote-banner .text strong{color:var(--accent);}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none !important;}
</style>

  const hG=new THREE.Group();
  for(let i=0;i<60;i++){const t=i*0.3;const x1=Math.cos(t)*3,z1=Math.sin(t)*3,x2=Math.cos(t+Math.PI)*3,z2=Math.sin(t+Math.PI)*3,y=t-9;const sG=new THREE.SphereGeometry(0.15,8,8);const s1=new THREE.Mesh(sG,new THREE.MeshBasicMaterial({color:0x00e8a2,transparent:true,opacity:0.7}));s1.position.set(x1,y,z1);hG.add(s1);const s2=new THREE.Mesh(sG,new THREE.MeshBasicMaterial({color:0x7c3aed,transparent:true,opacity:0.7}));s2.position.set(x2,y,z2);hG.add(s2);if(i%3===0){const lG=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,y,z1),new THREE.Vector3(x2,y,z2)]);hG.add(new THREE.Line(lG,new THREE.LineBasicMaterial({color:0x00e8a2,transparent:true,opacity:0.3})));}}
  hG.position.set(15,0,-10);scene.add(hG);
  const mG=new THREE.Group();mG.add(new THREE.Mesh(new THREE.SphereGeometry(0.6,16,16),new THREE.MeshBasicMaterial({color:0x00e8a2,transparent:true,opacity:0.5,wireframe:true})));
  for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;const o=new THREE.Mesh(new THREE.SphereGeometry(0.35,12,12),new THREE.MeshBasicMaterial({color:0x7c3aed,transparent:true,opacity:0.5,wireframe:true}));o.position.set(Math.cos(a)*2,Math.sin(a)*2,0);mG.add(o);const lG=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),o.position.clone()]);mG.add(new THREE.Line(lG,new THREE.LineBasicMaterial({color:0x00e8a2,transparent:true,opacity:0.4})));}
  mG.position.set(-18,5,-5);scene.add(mG);
  let time=0;function animate(){requestAnimationFrame(animate);time+=0.003;scene.children[0].rotation.y=time*0.5;scene.children[0].rotation.x=time*0.2;hG.rotation.y=time;mG.rotation.y=time*2;mG.rotation.x=time;renderer.render(scene,camera);}animate();
  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
}

// ===== UTILS =====
function toast(msg,type='info'){const c=document.getElementById('toasts');const t=document.createElement('div');t.className=`toast ${type}`;const i=type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle';t.innerHTML=`<i class="fas ${i}"></i> ${msg}`;c.appendChild(t);setTimeout(()=>t.remove(),4000);}
function formatDate(ts){if(!ts)return '';return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function getInitials(n){return(n||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function generateId(){return db.ref().child('temp').push().key;}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function signUp(email,password,name,phone,whatsapp){

  return auth.createUserWithEmailAndPassword(email,password).then(cred=>{
    return db.ref('users/'+cred.user.uid).set({name,email,phone,whatsapp,role,createdAt:firebase.database.ServerValue.TIMESTAMP,online:true});
  }).then(()=>toast(role==='admin'?'Admin account created!':'Account created! Registered as Student.','success')).catch(e=>toast(e.message,'error'));
}
function logIn(email,password){return auth.signInWithEmailAndPassword(email,password).then(()=>toast('Welcome back!','success')).catch(e=>toast(e.message,'error'));}

ass="main-content" id="main-content">${renderCurrentSection()}</main></div>`;}

// ===== ENSURE CATEGORIES EXIST =====
function ensureBatchCategories(batches){
  Object.entries(batches).forEach(([key,b])=>{
    const cats=b.categories?Object.values(b.categories).filter(c=>typeof c==='string'):[];
    if(cats.length===0){
      const catObj={};DEFAULT_CATEGORIES.forEach(c=>{catObj[generateId()]=c;});
      db.ref('batches/'+key+'/categories').set(catObj);
    }
  });
}

// ===== DASHBOARD =====
function renderDashboard(){return `<div class="page-header"><h1 class="page-title">Welcome, <span>${esc(state.userData?.name)||'User'}</span></h1></div><div class="cards-grid" id="dashboard-batches"><div class="card text-center text-dim" style="padding:3rem"><div class="spinner" style="width:30px;height:30px;margin:0 auto 1rem"></div>Loading batches...</div></div>`;}

function loadDashboardData(){
  db.ref('batches').once('value',snap=>{
    let batches=snap.val()||{};
    // Auto-create default batches if none exist
    if(Object.keys(batches).length===0){
      ['A/L 2026','A/L 2027','A/L 2028'].forEach(n=>{
        const id=generateId();
        const catObj={};DEFAULT_CATEGORIES.forEach(c=>{catObj[generateId()]=c;});
        db.ref('batches/'+id).set({name:n,categories:catObj,createdAt:firebase.database.ServerValue.TIMESTAMP});
      });
      setTimeout(loadDashboardData,2000);return;
    }
    // Fix missing categories
    ensureBatchCategories(batches);
    // Re-read after possible fix
    db.ref('batches').once('value',snap2=>{
      batches=snap2.val()||{};
      state.batchesCache=batches;
      // Sidebar nav
      const ni=document.getElementById('batch-nav-items');
      if(ni){let h='';Object.keys(batches).forEach(k=>{h+=`<div class="nav-item ${state.currentBatch===k?'active':''}" onclick="navigate('batch',{batch:'${k}'})"><i class="fas fa-flask"></i> ${esc(batches[k].name)}</div>`;});ni.innerHTML=h;}
      // Dashboard cards
      const dg=document.getElementById('dashboard-batches');
      if(dg){let h='';Object.keys(batches).forEach(k=>{const bb=batches[k];const c=bb.categories?Object.values(bb.categories).filter(x=>typeof x==='string'):[];h+=`<div class="batch-card card-3d" onclick="navigate('batch',{batch:'${k}'})"><div class="card-3d-inner"><div class="batch-year">${esc(bb.name.replace('A/L ',''))}</div><div class="batch-label">${esc(bb.name)}</div><div class="batch-stats"><div class="batch-stat"><i class="fas fa-tag"></i> ${c.length} Categories</div></div><div style="margin-top:0.8rem;display:flex;gap:4px;flex-wrap:wrap">${c.map(x=>`<span class="qna-category-tag">${esc(x)}</span>`).join('')}</div></div></div>`;});dg.innerHTML=h;}
    });
    // Chat request badge
    if(state.currentUser){db.ref('chatRequests').orderByChild('to').equalTo(state.currentUser.uid).once('value',s=>{const r=s.val()||{};const p=Object.values(r).filter(x=>x.status==='pending').length;const bd=document.getElementById('chat-req-badge');if(bd&&p>0)bd.innerHTML=`<span style="background:var(--danger);color:#fff;border-radius:50%;padding:1px 6px;font-size:0.7rem;font-weight:700">${p}</span>`;});}
  });
}

// ===== BATCH VIEW =====
function renderBatchView(){const bid=state.currentBatch;if(!bid)return '<div class="empty-state"><i class="fas fa-arrow-left"></i><p>Select a batch from the sidebar</p></div>';setTimeout(()=>loadBatchData(bid),50);const cu=state.userData?.role==='teacher'||state.userData?.role==='admin';return `<div class="page-header"><h1 class="page-title" id="batch-title">Loading...</h1><div class="flex gap-1"><button class="btn btn-secondary btn-sm" onclick="showAskQuestion('${bid}')"><i class="fas fa-plus"></i> Ask Question</button>${cu?`<button class="btn btn-secondary btn-sm" onclick="showUploadFile('${bid}')"><i class="fas fa-upload"></i> Upload File</button>`:''}</div></div><div class="cat-tabs" id="batch-categories"></div><div id="batch-content"><div class="text-center text-dim mt-3"><div class="spinner" style="width:24px;height:24px;margin:0 auto"></div></div></div><div id="batch-files-section" class="mt-3"></div>`;}

function loadBatchData(bid){
  db.ref('batches/'+bid).once('value',snap=>{
    const b=snap.val();if(!b)return;
    // Fix categories if missing
    const cats=b.categories?Object.values(b.categories).filter(x=>typeof x==='string'):[];
    if(cats.length===0){
      const catObj={};DEFAULT_CATEGORIES.forEach(c=>{catObj[generateId()]=c;});
      db.ref('batches/'+bid+'/categories').set(catObj);
      setTimeout(()=>loadBatchData(bid),1000);return;
    }
    const t=document.getElementById('batch-title');if(t)t.innerHTML=`<span>${esc(b.name)}</span>`;
    const cc=document.getElementById('batch-categories');
    if(cc){let h=`<div class="cat-tab ${state.currentCategory==='all'?'active':''}" onclick="setCategory('all')">All</div>`;cats.forEach(c=>{h+=`<div class="cat-tab ${state.currentCategory===c?'active':''}" onclick="setCategory('${esc(c)}')">${esc(c)}</div>`;});cc.innerHTML=h;}
    loadQnA(bid);loadFiles(bid);
  });
}
function setCategory(c){state.currentCategory=c;if(state.currentBatch)loadBatchData(state.currentBatch);}

// ===== Q&A =====
function loadQnA(bid){state.qnaListeners.forEach(fn=>fn());state.qnaListeners=[];const ref=db.ref('qna/'+bid);const cb=ref.on('value',snap=>{const q=snap.val()||{};const ct=document.getElementById('batch-content');if(!ct)return;let h='';const qk=Object.keys(q);if(qk.length===0){h='<div class="empty-state"><i class="fas fa-question-circle"></i><p>No questions yet. Be the first to ask!</p></div>';}else{qk.reverse().forEach(k=>{const qq=q[k];if(state.currentCategory!=='all'&&qq.category!==state.currentCategory)return;const ans=qq.answers?Object.values(qq.answers):[];const cr=state.userData?.role==='teacher'||state.userData?.role==='admin';const cd=qq.authorId===state.currentUser?.uid||state.userData?.role==='admin';h+=`<div class="qna-item"><div class="qna-header"><div class="qna-avatar">${getInitials(qq.authorName)}</div><div class="qna-meta"><div class="qna-author">${esc(qq.authorName)||'Unknown'} <span class="role-badge ${qq.authorRole||'student'}" style="font-size:0.65rem">${qq.authorRole||'student'}</span></div><div class="qna-time">${formatDate(qq.timestamp)}</div></div></div><span class="qna-category-tag">${esc(qq.category||'General')}</span><div class="qna-title">${esc(qq.title)}</div><div class="qna-body">${esc(qq.content)}</div>${qq.fileData?`<div class="file-item mt-1"><i class="fas fa-paperclip"></i><div class="file-item-info"><div class="file-item-name">${esc(qq.fileName||'Attachment')}</div></div><a href="${qq.fileData}" download="${esc(qq.fileName||'file')}" class="btn btn-xs btn-secondary"><i class="fas fa-download"></i></a></div>`:''}<div class="qna-actions"><button class="btn btn-xs btn-secondary" onclick="toggleAnswers('${k}')"><i class="fas fa-comments"></i> ${ans.length} Answer${ans.length!==1?'s':''}</button>${cr?`<button class="btn btn-xs btn-primary" onclick="showAnswerForm('${bid}','${k}')"><i class="fas fa-reply"></i> Reply</button>`:''}${cd?`<button class="btn btn-xs btn-danger" onclick="deleteQuestion('${bid}','${k}')"><i class="fas fa-trash"></i></button>`:''}</div><div id="answers-${k}" class="hidden mt-1">${ans.map(a=>`<div class="answer-item"><div class="flex items-center gap-1 mb-1"><div class="qna-avatar" style="width:24px;height:24px;font-size:0.6rem">${getInitials(a.authorName)}</div><strong style="font-size:0.85rem">${esc(a.authorName)}</strong><span class="role-badge ${a.authorRole||'student'}" style="font-size:0.6rem">${a.authorRole||'student'}</span><span class="text-dim" style="font-size:0.72rem">${formatDate(a.timestamp)}</span></div><div style="font-size:0.9rem;line-height:1.5">${esc(a.content)}</div>${a.fileData?`<div class="file-item mt-1"><i class="fas fa-paperclip"></i><div class="file-item-info"><div class="file-item-name">${esc(a.fileName||'Attachment')}</div></div><a href="${a.fileData}" download="${esc(a.fileName||'file')}" class="btn btn-xs btn-secondary"><i class="fas fa-download"></i></a></div>`:''}</div>`).join('')}</div></div>`;});}ct.innerHTML=h;});state.qnaListeners.push(()=>ref.off('value',cb));}
function toggleAnswers(k){document.getElementById('answers-'+k)?.classList.toggle('hidden');}
function showAskQuestion(bid){db.ref('batches/'+bid+'/categories').once('value',snap=>{const cats=snap.val()?Object.values(snap.val()).filter(x=>typeof x==='string'):[];if(cats.length===0)cats.push('General');const o=document.createElement('div');o.className='modal-overlay';o.id='ask-modal';o.innerHTML=`<div class="modal"><h3><i class="fas fa-question-circle"></i> Ask a Question</h3><div class="form-group"><label>Category</label><select id="q-category">${cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div><div class="form-group"><label>Title</label><input type="text" id="q-title" placeholder="Your question title"></div><div class="form-group"><label>Description</label><textarea id="q-content" placeholder="Describe your question..."></textarea></div><div class="form-group"><label>Attachment (optional, max 1MB)</label><input type="file" id="q-file" style="border:none;padding:0;background:transparent"></div><div class="flex gap-1"><button class="btn btn-primary" onclick="submitQuestion('${bid}')"><i class="fas fa-paper-plane"></i> Submit</button><button class="btn btn-secondary" onclick="document.getElementById('ask-modal').remove()">Cancel</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});});}
function submitQuestion(bid){const c=document.getElementById('q-category').value;const t=document.getElementById('q-title').value.trim();const ct=document.getElementById('q-content').value.trim();const fi=document.getElementById('q-file');if(!t||!ct)return toast('Please fill in title and description','error');const id=generateId();const d={title:t,content:ct,category:c,authorId:state.currentUser.uid,authorName:state.userData.name,authorRole:state.userData.role,timestamp:firebase.database.ServerValue.TIMESTAMP};const save=data=>{db.ref('qna/'+bid+'/'+id).set(data).then(()=>{toast('Question posted!','success');document.getElementById('ask-modal')?.remove();});};if(fi.files.length>0){const f=fi.files[0];if(f.size>1048576)return toast('File too large (max 1MB)','error');const r=new FileReader();r.onload=e=>{d.fileData=e.target.result;d.fileName=f.name;save(d);};r.readAsDataURL(f);}else{save(d);}}
function showAnswerForm(bid,qid){const o=document.createElement('div');o.className='modal-overlay';o.id='answer-modal';o.innerHTML=`<div class="modal"><h3><i class="fas fa-reply"></i> Post an Answer</h3><div class="form-group"><label>Your Answer</label><textarea id="a-content" placeholder="Write your answer..."></textarea></div><div class="form-group"><label>Attachment (optional, max 1MB)</label><input type="file" id="a-file" style="border:none;padding:0;background:transparent"></div><div class="flex gap-1"><button class="btn btn-primary" onclick="submitAnswer('${bid}','${qid}')"><i class="fas fa-paper-plane"></i> Post</button><button class="btn btn-secondary" onclick="document.getElementById('answer-modal').remove()">Cancel</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});}
function submitAnswer(bid,qid){const ct=document.getElementById('a-content').value.trim();const fi=document.getElementById('a-file');if(!ct)return toast('Please write an answer','error');const id=generateId();const d={content:ct,authorId:state.currentUser.uid,authorName:state.userData.name,authorRole:state.userData.role,timestamp:firebase.database.ServerValue.TIMESTAMP};const save=data=>{db.ref('qna/'+bid+'/'+qid+'/answers/'+id).set(data).then(()=>{toast('Answer posted!','success');document.getElementById('answer-modal')?.remove();});};if(fi.files.length>0){const f=fi.files[0];if(f.size>1048576)return toast('File too large (max 1MB)','error');const r=new FileReader();r.onload=e=>{d.fileData=e.target.result;d.fileName=f.name;save(d);};r.readAsDataURL(f);}else{save(d);}}
function deleteQuestion(bid,qid){if(!confirm('Delete this question?'))return;db.ref('qna/'+bid+'/'+qid).remove().then(()=>toast('Question deleted','success'));}

// ===== FILES =====
function loadFiles(bid){db.ref('files/'+bid).once('value',snap=>{const f=snap.val()||{};const ct=document.getElementById('batch-files-section');if(!ct)return;let h='';const fl=Object.entries(f).filter(([,x])=>state.currentCategory==='all'||x.category===state.currentCategory);if(fl.length>0){h=`<h3 class="mb-2" style="font-family:Orbitron;font-size:1.1rem"><i class="fas fa-folder-open text-primary"></i> Files & Resources</h3>`;fl.forEach(([k,ff])=>{h+=`<div class="file-item"><i class="fas fa-file-alt"></i><div class="file-item-info"><div class="file-item-name">${esc(ff.name)}</div><div class="file-item-meta">By ${esc(ff.uploadedByName)} &bull; ${formatDate(ff.timestamp)} &bull; ${esc(ff.category||'General')}</div></div><a href="${ff.fileData}" download="${esc(ff.name)}" class="btn btn-xs btn-primary"><i class="fas fa-download"></i></a>${ff.uploadedBy===state.currentUser?.uid||state.userData?.role==='admin'?`<button class="btn btn-xs btn-danger" onclick="deleteFile('${bid}','${k}')"><i class="fas fa-trash"></i></button>`:''}</div>`;});}ct.innerHTML=h;});}
function showUploadFile(bid){db.ref('batches/'+bid+'/categories').once('value',snap=>{const cats=snap.val()?Object.values(snap.val()).filter(x=>typeof x==='string'):[];if(cats.length===0)cats.push('General');const o=document.createElement('div');o.className='modal-overlay';o.id='upload-modal';o.innerHTML=`<div class="modal"><h3><i class="fas fa-upload"></i> Upload File</h3><div class="form-group"><label>Category</label><select id="f-category">${cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div><div class="form-group"><label>File (max 2MB)</label><input type="file" id="f-file" style="border:none;padding:0;background:transparent"></div><div class="flex gap-1"><button class="btn btn-primary" onclick="uploadFile('${bid}')"><i class="fas fa-cloud-upload-alt"></i> Upload</button><button class="btn btn-secondary" onclick="document.getElementById('upload-modal').remove()">Cancel</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});});}
function uploadFile(bid){const c=document.getElementById('f-category').value;const fi=document.getElementById('f-file');if(!fi.files.length)return toast('Select a file','error');const f=fi.files[0];if(f.size>2097152)return toast('File too large (max 2MB)','error');const r=new FileReader();r.onload=e=>{const id=generateId();db.ref('files/'+bid+'/'+id).set({name:f.name,fileData:e.target.result,category:c,uploadedBy:state.currentUser.uid,uploadedByName:state.userData.name,timestamp:firebase.database.ServerValue.TIMESTAMP}).then(()=>{toast('File uploaded!','success');document.getElementById('upload-modal')?.remove();});};r.readAsDataURL(f);}
function deleteFile(bid,fid){if(!confirm('Delete this file?'))return;db.ref('files/'+bid+'/'+fid).remove().then(()=>toast('File deleted','success'));}

function renderUsersDirectory(){setTimeout(()=>{db.ref('users').once('value',snap=>{const u=snap.val()||{};const ct=document.getElementById('users-grid');if(!ct)return;let h='';Object.keys(u).forEach(uid=>{if(uid===state.currentUser.uid)return;const uu=u[uid];h+=`<div class="user-card"><div class="user-card-avatar">${getInitials(uu.name)}</div><div class="user-card-info"><div class="user-card-name">${esc(uu.name)}</div><div class="user-card-role"><span class="role-badge ${uu.role}">${uu.role}</span></div></div><button class="btn btn-xs btn-primary" onclick="sendChatRequest('${uid}')"><i class="fas fa-comment"></i> Chat</button></div>`;});if(!h)h='<div class="empty-state"><i class="fas fa-users"></i><p>No other users yet</p></div>';ct.innerHTML=h;});},50);return `<div class="page-header"><h1 class="page-title"><span>Users</span> Directory</h1></div><div class="cards-grid" id="users-grid"><div class="text-center text-dim" style="padding:3rem"><div class="spinner" style="width:24px;height:24px;margin:0 auto"></div></div></div>`;}

// ===== CHAT - FIXED =====
function sendChatRequest(toUid){const from=state.currentUser.uid;db.ref('chatRequests').orderByChild('from').equalTo(from).once('value',snap=>{const ex=snap.val()||{};const as=Object.values(ex).some(r=>r.to===toUid&&r.status!=='rejected');if(as)return toast('Chat request already sent','info');db.ref('chatRooms').once('value',snap2=>{const rooms=snap2.val()||{};const re=Object.values(rooms).some(r=>r.participants&&r.participants[from]&&r.participants[toUid]);if(re)return toast('You already have a chat with this user','info');const id=generateId();db.ref('chatRequests/'+id).set({from,to:toUid,fromName:state.userData.name,status:'pending',timestamp:firebase.database.ServerValue.TIMESTAMP}).then(()=>toast('Chat request sent!','success'));});});}

function renderChat(){setTimeout(loadChatList,100);return `<div class="page-header"><h1 class="page-title"><span>Chat</span></h1><button class="btn btn-secondary btn-sm" onclick="showChatRequests()"><i class="fas fa-inbox"></i> Requests</button></div><div class="chat-layout"><div class="chat-list-panel"><div class="chat-list-header"><div class="search-box w-full"><i class="fas fa-search"></i><input placeholder="Search chats..." id="chat-search"></div></div><div class="chat-list" id="chat-list"><div class="text-center text-dim" style="padding:2rem"><div class="spinner" style="margin:0 auto"></div></div></div></div><div class="chat-room-panel" id="chat-room-panel"><div class="empty-state" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center"><i class="fas fa-comments" style="font-size:3rem;opacity:0.2;margin-bottom:1rem"></i><p>Select a conversation or start a new one</p></div></div></div>`;}

function loadChatList(){
  const uid=state.currentUser.uid;
  state.chatListeners.forEach(fn=>fn());state.chatListeners=[];
  const ref=db.ref('chatRooms');
  const cb=ref.on('value',snap=>{
    const rooms=snap.val()||{};
    const ct=document.getElementById('chat-list');
    if(!ct)return;
    state.chatRoomsList=[];
    Object.keys(rooms).forEach(rid=>{
      const room=rooms[rid];
      if(!room.participants||!room.participants[uid])return;
      const oid=Object.keys(room.participants).find(id=>id!==uid);
      if(!oid)return;
      state.chatRoomsList.push({roomId:rid,otherUid:oid,otherName:room.participantNames?.[oid]||'User',lastMessage:room.lastMessage||'No messages'});
    });
    let h='';
    if(state.chatRoomsList.length===0){
      h='<div class="text-center text-dim" style="padding:2rem;font-size:0.9rem">No conversations yet.<br>Start one from Users Directory!</div>';
    }else{
      state.chatRoomsList.forEach((room,idx)=>{
        const isActive=state.currentChatId===room.roomId;
        h+=`<div class="chat-list-item ${isActive?'active':''}" onclick="openChatByIndex(${idx})"><div class="user-card-avatar" style="width:40px;height:40px;font-size:0.85rem">${getInitials(room.otherName)}</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:0.9rem">${esc(room.otherName)}</div><div style="font-size:0.78rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(room.lastMessage)}</div></div></div>`;
      });
    }
    ct.innerHTML=h;
  });
  state.chatListeners.push(()=>ref.off('value',cb));
}

function openChatByIndex(idx){
  const room=state.chatRoomsList[idx];
  if(!room)return;
  state.currentChatId=room.roomId;
  const panel=document.getElementById('chat-room-panel');
  if(!panel)return;
  panel.innerHTML=`<div class="chat-room-header"><div class="user-card-avatar" style="width:36px;height:36px;font-size:0.8rem">${getInitials(room.otherName)}</div><div><div style="font-weight:600">${esc(room.otherName)}</div><div style="font-size:0.75rem;color:var(--text-dim)">Private Chat</div></div></div><div class="chat-messages" id="chat-messages"></div><div class="chat-input-area"><input type="text" id="chat-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendChatMsg()"><button class="btn btn-primary btn-sm" onclick="sendChatMsg()"><i class="fas fa-paper-plane"></i></button></div>`;
  // Clean old msg listeners
  state.msgListeners.forEach(fn=>fn());state.msgListeners=[];
  const ref=db.ref('chatMessages/'+room.roomId);
  const cb=ref.on('value',snap=>{
    const msgs=snap.val()||{};
    const ct=document.getElementById('chat-messages');
    if(!ct)return;
    let h='';
    Object.values(msgs).sort((a,b)=>(a.timestamp||0)-(b.timestamp||0)).forEach(m=>{
      const s=m.senderId===state.currentUser.uid;
      h+=`<div class="chat-msg ${s?'sent':'received'}">${esc(m.content)}<div class="chat-msg-time">${formatDate(m.timestamp)}</div></div>`;
    });
    ct.innerHTML=h;ct.scrollTop=ct.scrollHeight;
  });
  state.msgListeners.push(()=>ref.off('value',cb));
  // Highlight active chat in list
  document.querySelectorAll('.chat-list-item').forEach((el,i)=>{el.classList.toggle('active',i===idx);});
}

function sendChatMsg(){
  if(!state.currentChatId)return;
  const i=document.getElementById('chat-input');if(!i)return;
  const c=i.value.trim();if(!c)return;
  const id=generateId();
  db.ref('chatMessages/'+state.currentChatId+'/'+id).set({content:c,senderId:state.currentUser.uid,senderName:state.userData.name,timestamp:firebase.database.ServerValue.TIMESTAMP});
  db.ref('chatRooms/'+state.currentChatId).update({lastMessage:c.slice(0,50),lastTimestamp:firebase.database.ServerValue.TIMESTAMP});
  i.value='';
}

function showChatRequests(){
  const uid=state.currentUser.uid;
  db.ref('chatRequests').orderByChild('to').equalTo(uid).once('value',snap=>{
    const reqs=snap.val()||{};
    const o=document.createElement('div');o.className='modal-overlay';o.id='chatreq-modal';
    let h='<div class="modal"><h3><i class="fas fa-inbox"></i> Chat Requests</h3>';
    const pending=Object.entries(reqs).filter(([,r])=>r.status==='pending');
    if(pending.length===0){h+='<div class="text-center text-dim" style="padding:1rem">No pending requests</div>';}
    else{pending.forEach(([k,r])=>{h+=`<div class="chat-request-item"><div class="user-card-avatar" style="width:36px;height:36px">${getInitials(r.fromName)}</div><div style="flex:1"><strong>${esc(r.fromName)}</strong><br><span class="text-dim" style="font-size:0.78rem">${formatDate(r.timestamp)}</span></div><button class="btn btn-xs btn-primary" onclick="acceptChatRequest('${k}','${r.from}')">Accept</button><button class="btn btn-xs btn-danger" onclick="rejectChatRequest('${k}')">Decline</button></div>`;});}
    h+=`<button class="btn btn-secondary w-full mt-2" onclick="document.getElementById('chatreq-modal').remove()" style="justify-content:center">Close</button></div>`;
    o.innerHTML=h;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  });
}

function acceptChatRequest(reqId,fromUid){
  db.ref('chatRequests/'+reqId).update({status:'accepted'});
  const roomId=generateId();
  const p={};p[state.currentUser.uid]=true;p[fromUid]=true;
  const pn={};pn[state.currentUser.uid]=state.userData.name;
  db.ref('users/'+fromUid+'/name').once('value',snap=>{
    pn[fromUid]=snap.val()||'User';
    db.ref('chatRooms/'+roomId).set({participants:p,participantNames:pn,lastMessage:'Chat started',lastTimestamp:firebase.database.ServerValue.TIMESTAMP,createdAt:firebase.database.ServerValue.TIMESTAMP}).then(()=>{
      toast('Chat request accepted!','success');
      document.getElementById('chatreq-modal')?.remove();
      state.currentChatId=roomId;
      navigate('chat');
    });
  });
}

function rejectChatRequest(reqId){db.ref('chatRequests/'+reqId).update({status:'rejected'}).then(()=>{toast('Chat request declined','info');document.getElementById('chatreq-modal')?.remove();});}

// ===== ADMIN =====
function renderAdmin(){if(state.userData?.role!=='admin')return '<div class="empty-state"><i class="fas fa-lock"></i><p>Access denied. Admin only.</p></div>';return `<div class="page-header"><h1 class="page-title"><span>Admin</span> Panel</h1></div><div class="admin-tabs"><div class="admin-tab ${state.adminTab==='batches'?'active':''}" onclick="setAdminTab('batches')"><i class="fas fa-layer-group"></i> Batches</div><div class="admin-tab ${state.adminTab==='categories'?'active':''}" onclick="setAdminTab('categories')"><i class="fas fa-tags"></i> Categories</div><div class="admin-tab ${state.adminTab==='users'?'active':''}" onclick="setAdminTab('users')"><i class="fas fa-users-cog"></i> Users</div><div class="admin-tab ${state.adminTab==='chats'?'active':''}" onclick="setAdminTab('chats')"><i class="fas fa-eye"></i> View Chats</div></div><div id="admin-content">${renderAdminTab()}</div>`;}
function setAdminTab(t){state.adminTab=t;const ct=document.getElementById('admin-content');if(ct)ct.innerHTML=renderAdminTab();document.querySelectorAll('.admin-tab').forEach(el=>{const tl={batches:'batch',categories:'categor',users:'user',chats:'chat'};el.classList.toggle('active',el.textContent.toLowerCase().includes(tl[t]||t));});}
function renderAdminTab(){switch(state.adminTab){case 'batches':return renderAdminBatches();case 'categories':return renderAdminCategories();case 'users':return renderAdminUsers();case 'chats':return renderAdminChats();default:return '';}}

function renderAdminBatches(){setTimeout(()=>{db.ref('batches').once('value',snap=>{const b=snap.val()||{};const ct=document.getElementById('admin-batches-list');if(!ct)return;let h='';if(Object.keys(b).length===0){h='<div class="text-dim text-center" style="padding:1rem">No batches yet</div>';}else{Object.entries(b).forEach(([k,bb])=>{const cats=bb.categories?Object.values(bb.categories).filter(x=>typeof x==='string'):[];h+=`<div class="flex items-center justify-between" style="padding:0.8rem;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:0.5rem"><div><strong>${esc(bb.name)}</strong><div class="text-dim" style="font-size:0.8rem">${cats.join(', ')||'No categories'}</div></div><div class="flex gap-1"><button class="btn btn-xs btn-secondary" onclick="editBatch('${k}')"><i class="fas fa-edit"></i></button><button class="btn btn-xs btn-danger" onclick="deleteBatch('${k}')"><i class="fas fa-trash"></i></button></div></div>`;});}ct.innerHTML=h;});},50);return `<div class="card mb-2"><h3 style="margin-bottom:1rem"><i class="fas fa-plus-circle text-primary"></i> Add Batch</h3><div class="flex gap-1"><input type="text" id="new-batch-name" placeholder="e.g. A/L 2029" style="flex:1;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:Inter,sans-serif"><button class="btn btn-primary" onclick="addBatch()"><i class="fas fa-plus"></i> Add</button></div></div><div id="admin-batches-list"><div class="text-center text-dim"><div class="spinner" style="margin:0 auto"></div></div></div>`;}
function addBatch(){const n=document.getElementById('new-batch-name').value.trim();if(!n)return toast('Enter batch name','error');const id=generateId();const catObj={};DEFAULT_CATEGORIES.forEach(c=>{catObj[generateId()]=c;});db.ref('batches/'+id).set({name:n,categories:catObj,createdAt:firebase.database.ServerValue.TIMESTAMP}).then(()=>{toast('Batch added!','success');document.getElementById('new-batch-name').value='';renderAdminTab();});}
function editBatch(k){db.ref('batches/'+k).once('value',snap=>{const b=snap.val();if(!b)return;const o=document.createElement('div');o.className='modal-overlay';o.id='edit-batch-modal';o.innerHTML=`<div class="modal"><h3><i class="fas fa-edit"></i> Edit Batch</h3><div class="form-group"><label>Batch Name</label><input type="text" id="edit-batch-name" value="${esc(b.name)}"></div><div class="flex gap-1"><button class="btn btn-primary" onclick="saveBatchEdit('${k}')"><i class="fas fa-save"></i> Save</button><button class="btn btn-secondary" onclick="document.getElementById('edit-batch-modal').remove()">Cancel</button></div></div>`;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});});}
function saveBatchEdit(k){const n=document.getElementById('edit-batch-name').value.trim();if(!n)return toast('Enter batch name','error');db.ref('batches/'+k+'/name').set(n).then(()=>{toast('Batch updated!','success');document.getElementById('edit-batch-modal')?.remove();renderAdminTab();});}
function deleteBatch(k){if(!confirm('Delete this batch and all its content?'))return;db.ref('batches/'+k).remove();db.ref('qna/'+k).remove();db.ref('files/'+k).remove();toast('Batch deleted','success');renderAdminTab();}

function renderAdminCategories(){setTimeout(()=>{db.ref('batches').once('value',snap=>{const b=snap.val()||{};const ct=document.getElementById('admin-cat-list');if(!ct)return;let h='';if(Object.keys(b).length===0){h='<div class="text-dim text-center" style="padding:1rem">No batches yet.</div>';}else{Object.entries(b).forEach(([k,bb])=>{const cats=bb.categories?Object.entries(bb.categories).filter(([,v])=>typeof v==='string'):[];h+=`<div class="card mb-2"><h4 style="margin-bottom:0.8rem"><i class="fas fa-flask text-primary"></i> ${esc(bb.name)}</h4><div class="flex flex-wrap gap-1 mb-1">${cats.map(([ck,c])=>`<span class="qna-category-tag" style="display:inline-flex;align-items:center;gap:4px">${esc(c)}<button onclick="deleteCategory('${k}','${ck}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.7rem"><i class="fas fa-times"></i></button></span>`).join('')}${cats.length===0?'<span class="text-dim" style="font-size:0.85rem">No categories - click + to add</span>':''}</div><div class="flex gap-1 mt-1"><input type="text" id="new-cat-${k}" placeholder="New category" style="flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem"><button class="btn btn-xs btn-primary" onclick="addCategory('${k}')"><i class="fas fa-plus"></i></button></div></div>`;});}ct.innerHTML=h;});},50);return `<div id="admin-cat-list"><div class="text-center text-dim"><div class="spinner" style="margin:0 auto"></div></div></div>`;}
function addCategory(bk){const i=document.getElementById('new-cat-'+bk);const c=i.value.trim();if(!c)return toast('Enter category name','error');const id=generateId();db.ref('batches/'+bk+'/categories/'+id).set(c).then(()=>{toast('Category added!','success');i.value='';renderAdminTab();});}
function deleteCategory(bk,ck){if(!confirm('Delete this category?'))return;db.ref('batches/'+bk+'/categories/'+ck).remove().then(()=>{toast('Category deleted','success');renderAdminTab();});}

function renderAdminUsers(){setTimeout(()=>{db.ref('users').once('value',snap=>{const u=snap.val()||{};const ct=document.getElementById('admin-users-list');if(!ct)return;let h=`<div class="promote-banner mb-2"><i class="fas fa-user-shield"></i><div class="text"><strong>Role Management:</strong> Only you (Admin) can assign the Teacher role. Students cannot self-promote.</div></div><div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>WhatsApp</th><th>Change Role</th><th>Actions</th></tr></thead><tbody>`;Object.entries(u).forEach(([uid,uu])=>{const ia=uu.email?.toLowerCase()===ADMIN_EMAIL.toLowerCase();h+=`<tr><td style="font-weight:600">${esc(uu.name)}</td><td style="font-size:0.8rem">${esc(uu.email)}</td><td><span class="role-badge ${uu.role}">${uu.role}</span></td><td style="font-size:0.8rem">${esc(uu.phone)||'-'}</td><td style="font-size:0.8rem">${esc(uu.whatsapp)||'-'}</td><td><select onchange="changeUserRole('${uid}',this.value)" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:0.78rem;cursor:pointer"><option value="student" ${uu.role==='student'?'selected':''}>Student</option><option value="teacher" ${uu.role==='teacher'?'selected':''}>Teacher</option><option value="admin" ${uu.role==='admin'?'selected':''}>Admin</option></select></td><td>${ia?'<span class="text-dim" style="font-size:0.75rem"><i class="fas fa-shield-alt"></i> Protected</span>':`<button class="btn btn-xs btn-danger" onclick="deleteUser('${uid}')"><i class="fas fa-trash"></i> Remove</button>`}</td></tr>`;});h+='</tbody></table></div>';ct.innerHTML=h;});},50);return `<div id="admin-users-list"><div class="text-center text-dim"><div class="spinner" style="margin:0 auto"></div></div></div>`;}
function changeUserRole(uid,role){const rn={student:'Student',teacher:'Teacher',admin:'Admin'};if(!confirm(`Change this user's role to ${rn[role]}?`))return;db.ref('users/'+uid+'/role').set(role).then(()=>{toast(`Role updated to ${rn[role]}!`,'success');renderAdminTab();});}
function deleteUser(uid){if(!confirm('Remove this user from the database?'))return;db.ref('users/'+uid).remove().then(()=>{toast('User removed','success');renderAdminTab();});}

function renderAdminChats(){setTimeout(()=>{db.ref('chatRooms').once('value',snap=>{const rooms=snap.val()||{};const ct=document.getElementById('admin-chats-list');if(!ct)return;let h='';if(Object.keys(rooms).length===0){h='<div class="text-dim text-center" style="padding:2rem">No chat rooms yet</div>';}else{Object.entries(rooms).forEach(([rid,room])=>{const names=room.participantNames||{};const nl=Object.values(names).map(n=>esc(n)).join(' & ');h+=`<div class="card mb-1"><div class="flex items-center justify-between"><div><strong>${nl}</strong><div class="text-dim" style="font-size:0.78rem">Last: ${esc(room.lastMessage||'No messages')} &bull; ${formatDate(room.lastTimestamp)}</div></div><button class="btn btn-xs btn-secondary" onclick="adminViewChat('${rid}')"><i class="fas fa-eye"></i> View</button></div></div>`;});}ct.innerHTML=h;});},50);return `<div id="admin-chats-list"><div class="text-center text-dim"><div class="spinner" style="margin:0 auto"></div></div></div>`;}
function adminViewChat(rid){db.ref('chatMessages/'+rid).once('value',snap=>{const msgs=snap.val()||{};const o=document.createElement('div');o.className='modal-overlay';o.id='admin-chat-modal';let h='<div class="modal"><h3><i class="fas fa-eye text-primary"></i> Chat Messages</h3><div style="max-height:400px;overflow-y:auto">';const sorted=Object.values(msgs).sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));if(sorted.length===0){h+='<div class="text-dim text-center" style="padding:1rem">No messages</div>';}else{sorted.forEach(m=>{h+=`<div class="chat-msg received" style="max-width:90%"><strong style="font-size:0.75rem;color:var(--accent)">${esc(m.senderName)}</strong><br>${esc(m.content)}<div class="chat-msg-time">${formatDate(m.timestamp)}</div></div>`;});}h+=`</div><button class="btn btn-secondary w-full mt-2" onclick="document.getElementById('admin-chat-modal').remove()" style="justify-content:center">Close</button></div>`;o.innerHTML=h;document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});});}

// ===== AUTH STATE WITH AUTO-ADMIN FIX =====
auth.onAuthStateChanged(user=>{
  if(user){
    state.currentUser=user;
    db.ref('users/'+user.uid).once('value',snap=>{
      let ud=snap.val();
      if(!ud){
        const role=(user.email&&user.email.trim().toLowerCase()===ADMIN_EMAIL.toLowerCase())?'admin':'student';
        ud={name:user.displayName||user.email.split('@')[0],email:user.email,phone:'',whatsapp:'',role,createdAt:firebase.database.ServerValue.TIMESTAMP,online:true};
        db.ref('users/'+user.uid).set(ud).then(()=>{state.userData=ud;state.currentSection='dashboard';render();toast(`Profile created! Role: ${role}`,'success');});
        return;
      }
      if(user.email&&user.email.trim().toLowerCase()===ADMIN_EMAIL.toLowerCase()&&ud.role!=='admin'){
        db.ref('users/'+user.uid+'/role').set('admin').then(()=>{ud.role='admin';state.userData=ud;state.currentSection='dashboard';db.ref('users/'+user.uid+'/online').set(true);render();toast('Admin privileges restored!','success');});
        return;
      }
      state.userData=ud;state.currentSection='dashboard';db.ref('users/'+user.uid+'/online').set(true);render();
    });
  }else{
    state.currentUser=null;state.userData=null;state.currentSection='landing';cleanupListeners();render();
  }
});

initBackground();render();
window.addEventListener('beforeunload',()=>{if(state.currentUser)db.ref('users/'+state.currentUser.uid+'/online').set(false);});
</script>
